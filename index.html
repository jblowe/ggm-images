<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gregory Maskarinec Photo Archive — Geographic Mosaic</title>
<style>
  html, body { margin: 0; height: 100%; background: #111; color: #eee;
    font: 14px/1.4 system-ui, sans-serif; }
  header { padding: 8px 12px; display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header a { margin-left: auto; color: #6aa9ff; text-decoration: none; font-weight: 600; }
  header a:hover { text-decoration: underline; }
  #osd { width: 100%; height: calc(100% - 40px); background: #000; }
</style>
</head>
<body>
  <header>
    <h1>Gregory Maskarinec Photo Archive — zoomable mosaic</h1>
    <a href="https://jblowe.github.io/ggm-images/">Browse by location ↗</a>
  </header>
  <div id="osd"></div>
  <script src="openseadragon/openseadragon.min.js"></script>
  <script>
    var viewer = OpenSeadragon({
      id: "osd",
      prefixUrl: "openseadragon/images/",
      tileSources: "gm.dzi",
      showNavigator: true,
      navigatorPosition: "BOTTOM_RIGHT",
      homeFillsViewport: false,    // contain, never crop the edges
      minZoomImageRatio: 0.2,      // allow zooming out past fit
      maxZoomPixelRatio: 4,
      visibilityRatio: 1,
      constrainDuringPan: true,
      gestureSettingsMouse: { clickToZoom: false, dblClickToZoom: true }
    });
    // Fit the entire mosaic on open, regardless of window aspect ratio.
    viewer.addHandler("open", function () {
      viewer.viewport.fitBounds(viewer.world.getItemAt(0).getBounds(), true);
    });
  </script>
</body>
</html>
